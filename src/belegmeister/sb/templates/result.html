<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Belegmeister — Anforderung erstellt</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen py-10">
  <main class="max-w-2xl mx-auto bg-white rounded-xl shadow p-8">
    <h1 class="text-xl font-semibold text-slate-800 mb-1">
      Anforderung erstellt
    </h1>
    <p class="text-sm text-slate-500 mb-6">
      Der Anforderungsbrief wurde in die Vorgangsmappe hochgeladen.
      Kopieren Sie den folgenden Link und übermitteln Sie ihn dem
      Mandanten (es wird keine E-Mail versendet).
    </p>

    <label class="block text-sm font-medium text-slate-700 mb-1">
      Magic-Link
    </label>
    <div class="flex gap-2">
      <input id="link" type="text" readonly value="{{ link }}"
             onclick="this.select()"
             class="flex-1 border border-slate-300 rounded p-2 text-sm font-mono bg-slate-50">
      <button type="button" onclick="copyLink()"
              class="bg-slate-800 text-white px-4 rounded text-sm hover:bg-slate-700">
        Kopieren
      </button>
    </div>
    <p id="copied" class="mt-1 text-sm text-green-700 hidden">Kopiert.</p>

    <a href="/sb"
       class="inline-block mt-6 text-sm text-slate-700 underline hover:text-slate-900">
      &larr; Weitere Anforderung erstellen
    </a>
  </main>

  <script>
    function copyLink() {
      const el = document.getElementById("link");
      el.select();
      navigator.clipboard.writeText(el.value).then(function () {
        document.getElementById("copied").classList.remove("hidden");
      });
    }
  </script>
</body>
</html>
